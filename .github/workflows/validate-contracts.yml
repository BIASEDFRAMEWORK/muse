name: Validate Muse Contracts

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate required contracts exist
        run: |
          set -e
          for f in \
            docs/organizational-contracts/product-vision.md \
            docs/organizational-contracts/primary-users-personas.md \
            docs/organizational-contracts/user-story-format.md \
            docs/organizational-contracts/ai-prompt-format-spec.md \
            docs/organizational-contracts/ai-constraints-policy.md \
            docs/organizational-contracts/repo-structure.md; do
              test -f "$f" || (echo "Missing $f" && exit 1)
          done

      - name: Validate TODO.md sync
        run: |
          echo "TODO: add generator-based validation"
