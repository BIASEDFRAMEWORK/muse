name: Security

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  dependency-review:
    name: dependency-review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: critical
          allow-licenses: 'MIT,Apache-2.0,BSD-3-Clause,BSD-2-Clause,CC-BY-4.0,ISC,0BSD'
          allow-dependencies-licenses: 'pkg:npm/@aws-sdk/crc64-nvme'
          # CC-BY-4.0: caniuse-lite (data package used by browserslist)
          # ISC: common permissive license for npm packages
          # 0BSD: AWS SDK packages use this license
          # AWS SDK packages are Apache-2.0 but may have detection issues

  codeql:
    name: codeql
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
      security-events: write
      actions: read
    env:
      CODEQL_EXTRACTOR_PYTHON_ANALYSIS_ENABLED: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd677812177e0c29f9c970a6c58d8607ae1bfefd # v4
        with:
          languages: javascript

      - name: Use Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build JavaScript code
        run: npm run build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dd677812177e0c29f9c970a6c58d8607ae1bfefd # v4
        with:
          category: "security"
