name: Muse Pipeline

permissions:
  contents: write
  pull-requests: write

on:
  push:
    paths:
      - 'docs/governance/**'
  workflow_dispatch:

jobs:
  muse-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.MUSE_APP_ID }}
          private-key: ${{ secrets.MUSE_APP_PRIVATE_KEY }}
          owner: BIASEDFRAMEWORK
          repositories: Muse

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Verify app auth
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api /repos/BIASEDFRAMEWORK/Muse --jq '.full_name'

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --upgrade pip
          pip install markitdown

      - name: Build CLI
        run: npm run build

      - name: Initialize config if missing
        run: |
          if [ ! -f muse.yaml ]; then
            node dist/cli/index.js init
          fi

      - name: Run Muse apply
        run: node dist/cli/index.js apply

      - name: Commit generated artifacts
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          commit_message: 'muse: generated backlog artifacts'
          file_pattern: docs/**

      - name: Create pull request
        id: create-pr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: 'muse: generated backlog artifacts'
          title: 'muse: generated backlog artifacts'
          body: 'Automated Muse pipeline output updates from governance document changes.'
          branch: muse/auto-generated-artifacts
          labels: |
            automation
            muse

      - name: Verify PR author is GitHub App
        if: ${{ steps.create-pr.outputs.pull-request-number != '' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          EXPECTED_AUTHOR: app/prbotformuse2
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
        run: |
          author=$(gh pr view "$PR_NUMBER" --json author --jq '.author.login')
          echo "PR #$PR_NUMBER author: $author"
          if [ "$author" != "$EXPECTED_AUTHOR" ]; then
            echo "Expected PR author $EXPECTED_AUTHOR but got $author"
            exit 1
          fi
