name: Dependabot Auto-Approve

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  autoapprove:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Approve clean Dependabot PR and enable auto-merge
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.DEPENDABOT_AUTOMATION_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            let pr;
            for (let attempt = 0; attempt < 10; attempt++) {
              const response = await github.rest.pulls.get({ owner, repo, pull_number });
              pr = response.data;
              if (pr.mergeable_state && pr.mergeable_state !== 'unknown') {
                break;
              }
              await new Promise((resolve) => setTimeout(resolve, 3000));
            }

            if (!pr) {
              core.setFailed('Unable to read PR details.');
              return;
            }

            if (pr.mergeable_state === 'dirty') {
              core.info('PR has conflicts; skipping auto-approve.');
              return;
            }

            if (pr.draft) {
              core.info('PR is draft; skipping auto-approve.');
              return;
            }

            const reviews = await github.rest.pulls.listReviews({ owner, repo, pull_number, per_page: 100 });
            const alreadyApproved = reviews.data.some((review) => review.user?.login === 'prbotformuse2[bot]' && review.state === 'APPROVED');

            if (!alreadyApproved) {
              await github.rest.pulls.createReview({
                owner,
                repo,
                pull_number,
                event: 'APPROVE',
                body: 'Auto-approved: Dependabot PR with no merge conflicts.'
              });
            }

            await github.graphql(
              `mutation EnableAutoMerge($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: {pullRequestId: $pullRequestId, mergeMethod: SQUASH}) {
                  pullRequest { number }
                }
              }`,
              { pullRequestId: pr.node_id }
            );

            core.info(`Approved and enabled auto-merge for PR #${pull_number}`);