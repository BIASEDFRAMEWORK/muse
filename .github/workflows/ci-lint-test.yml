name: Lint and Test

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  cli-build:
    name: CLI Build and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Lint Markdown
        run: npm run lint:md

      - name: Validate CLI entrypoints
        run: |
          node dist/cli/index.js init
          node dist/cli/index.js apply
