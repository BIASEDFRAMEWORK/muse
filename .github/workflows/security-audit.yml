name: Security Audit

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit-report:
    name: npm-audit-report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Use Node.js 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (JSON)
        run: npm audit --json > npm-audit-report.json || true

      - name: Fail on high/critical vulnerabilities
        run: |
          node -e "const fs=require('fs');const report=JSON.parse(fs.readFileSync('npm-audit-report.json','utf8'));const vuln=report.metadata?.vulnerabilities||{};const high=Number(vuln.high||0);const critical=Number(vuln.critical||0);if(high+critical>0){console.error('Found high/critical vulnerabilities:',{high,critical});process.exit(1)};console.log('No high/critical vulnerabilities detected')"

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: npm-audit-report
          path: npm-audit-report.json
